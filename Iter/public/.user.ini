; Takeout zip 업로드(TakeoutController::MAX_UPLOAD_BYTES = 500MB) 를 받으려면
; 기본값(대체로 upload_max_filesize=2M, post_max_size=8M)보다 커야 한다.
; ini_set() 은 이 두 지시자를 런타임에 바꿀 수 없어(PHP_INI_PERDIR) 이 파일로 설정한다.
upload_max_filesize = 500M
post_max_size = 520M

; LocationHistoryService::ingestFile() 이 위치기록 Timeline.json(최대 64MB, MAX_UPLOAD_BYTES)을
; file_get_contents + json_decode 로 통짜 파싱한다 — 디코딩된 배열은 원본 대비 5~10배까지
; 부풀 수 있어 기본 128M 로는 큰 파일에서 OOM 위험이 있다. 여유를 두고 512M 로 설정.
memory_limit = 512M
