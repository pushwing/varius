# coturn 설정 — rtic 온프레미스 TURN 서버
#
# 인증 방식: use-auth-secret (TURN REST API 방식, RFC 초안 "REST API For Access
# To TURN Services"와 동일한 HMAC-SHA1 공유 시크릿 스킴). 시크릿 값 자체는 이
# 파일에 두지 않고 docker-compose.yml의 --static-auth-secret=${TURN_SECRET}
# 커맨드라인 인자로 주입한다(.env, 커밋 금지).

listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0

# 릴레이용 포트 범위 — 온프레미스 방화벽에서 이 범위도 UDP로 열어야 한다.
min-port=49160
max-port=49200

use-auth-secret
realm=rtic-home

# 짧은 TTL의 임시 credential을 신뢰하는 대신, nonce 자체도 자주 갱신해
# credential 재사용 공격 창을 최소화한다.
stale-nonce=600

# 릴레이가 사설망·루프백을 향하는 SSRF성 오남용을 막는다.
no-loopback-peers
no-multicast-peers

no-cli
fingerprint
simple-log
log-file=stdout

# 운영 배포 시 실제 TLS 인증서 경로로 교체(Let's Encrypt 등). 로컬 검증
# 단계에서는 인증서가 없어 TLS(443) 리스너는 비활성 상태로 둔다.
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem
